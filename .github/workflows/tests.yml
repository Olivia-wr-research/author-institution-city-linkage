name: tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Compile
        run: python -m compileall src scripts
      - name: Tests
        run: python -m pytest -q
      - name: Existing smoke test
        run: python scripts/run_smoke_test.py
      - name: Existing example pipeline
        run: python scripts/run_example_pipeline.py --config config/config.example.json
      - name: Toolkit all-demo
        run: python -m scopus_toolkit all-demo
